<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Resoconto Settimanale - Mario Mela | RE/MAX Aequitas</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&family=Open+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--red:#DC1B27;--blue:#003DA5;--light:#f5f6f8;--border:#e2e4ea;--text:#1a1a2e;--muted:#6b7280;--success:#16a34a}
body{font-family:'Open Sans',sans-serif;background:var(--light);color:var(--text);min-height:100vh}
.header{background:var(--blue);position:relative}
.header::after{content:'';position:absolute;bottom:0;left:0;right:0;height:4px;background:var(--red)}
.header-inner{max-width:720px;margin:0 auto;padding:1.75rem 1.5rem;display:flex;align-items:center;gap:1.25rem}
.logo-circle{width:60px;height:60px;border-radius:50%;background:var(--red);display:flex;align-items:center;justify-content:center;font-family:Montserrat,sans-serif;font-weight:800;font-size:13px;color:white;flex-shrink:0;border:3px solid rgba(255,255,255,0.2)}
.header-text h1{font-family:Montserrat,sans-serif;font-size:11px;font-weight:700;color:rgba(255,255,255,0.6);letter-spacing:2.5px;text-transform:uppercase;margin-bottom:3px}
.header-text h2{font-family:Montserrat,sans-serif;font-size:21px;font-weight:800;color:white}
.header-text p{font-size:13px;color:rgba(255,255,255,0.65);margin-top:3px}
.main{max-width:720px;margin:0 auto;padding:1.5rem 1.5rem 3rem}
.card{background:white;border:1px solid var(--border);border-radius:12px;padding:1.5rem;margin-bottom:1.25rem}
.ctitle{font-family:Montserrat,sans-serif;font-size:13px;font-weight:700;color:var(--blue);text-transform:uppercase;letter-spacing:1px;margin-bottom:1.25rem}
.r2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.r3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:12px}
.r1{margin-bottom:12px}
.fg{display:flex;flex-direction:column;gap:5px}
.fg label{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1px}
.fg input,.fg select,.fg textarea{padding:10px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:14px;font-family:'Open Sans',sans-serif;color:var(--text);background:white;outline:none}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--blue)}
.fg textarea{resize:vertical;min-height:80px}
.admin-box{border:2px dashed #c7d3f5;border-radius:12px;padding:1.5rem;margin-bottom:1.25rem;background:white}
.atitle{font-family:Montserrat,sans-serif;font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:1rem;display:flex;align-items:center;gap:8px}
.badge{background:var(--blue);color:white;font-size:10px;padding:2px 8px;border-radius:20px;text-transform:none;font-weight:600;letter-spacing:0}
.btn-gen{display:block;width:100%;padding:13px;border-radius:8px;font-family:Montserrat,sans-serif;font-size:14px;font-weight:700;cursor:pointer;border:none;background:var(--blue);color:white;margin-top:4px}
.btn-gen:disabled{background:#ccc;cursor:not-allowed}
.link-box{background:#EEF2FF;border:1.5px solid var(--blue);border-radius:10px;padding:1rem 1.25rem;margin-top:1rem}
.llbl{font-size:11px;font-weight:700;color:var(--blue);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px}
.lurl{font-size:12px;color:#003DA5;word-break:break-all;line-height:1.6;margin-bottom:10px;font-family:monospace;background:white;border:1px solid #c7d3f5;border-radius:6px;padding:8px 10px}
.lbtns{display:flex;gap:8px;flex-wrap:wrap}
.lbtn{padding:9px 14px;border-radius:6px;font-family:Montserrat,sans-serif;font-size:12px;font-weight:700;cursor:pointer;border:none}
.lbtn-cp{background:var(--blue);color:white}
.lbtn-wa{background:#25D366;color:white}
.lbtn-pv{background:white;color:var(--blue);border:1.5px solid var(--blue)}
.rhead{background:white;border:1px solid var(--border);border-radius:12px;padding:1.5rem;margin-bottom:1.25rem}
.rtitle{font-family:Montserrat,sans-serif;font-size:22px;font-weight:800;color:var(--text);margin-bottom:4px}
.rsub{font-size:13px;color:var(--muted)}
.rbadge{display:inline-block;background:var(--red);color:white;font-family:Montserrat,sans-serif;font-size:11px;font-weight:700;padding:4px 12px;border-radius:20px;margin-top:8px}
.stats3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:1.25rem}
.stat{background:white;border:1px solid var(--border);border-radius:12px;padding:1.25rem;text-align:center}
.stic{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;margin:0 auto 10px}
.icb{background:#EEF2FF;color:var(--blue)}
.icr{background:#FEE2E2;color:var(--red)}
.icg{background:#DCFCE7;color:var(--success)}
.stn{font-family:Montserrat,sans-serif;font-size:28px;font-weight:800;color:var(--text)}
.stl{font-size:11px;color:var(--muted);margin-top:4px;text-transform:uppercase}
.irow{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--light)}
.irow:last-child{border-bottom:none}
.ik{font-size:13px;color:var(--muted)}
.iv{font-size:13px;color:var(--text);font-weight:600}
.pill-a{display:inline-block;padding:4px 12px;border-radius:20px;font-family:Montserrat,sans-serif;font-size:12px;font-weight:700;background:#DCFCE7;color:var(--success)}
.pill-m{display:inline-block;padding:4px 12px;border-radius:20px;font-family:Montserrat,sans-serif;font-size:12px;font-weight:700;background:#FEF3C7;color:#B45309}
.pill-b{display:inline-block;padding:4px 12px;border-radius:20px;font-family:Montserrat,sans-serif;font-size:12px;font-weight:700;background:#FEE2E2;color:var(--red)}
.fbbox{background:var(--light);border-radius:8px;padding:12px 14px;margin-bottom:8px;font-size:13px;line-height:1.6}
.fbwarn{background:#FEF3C7;border-radius:8px;padding:12px 14px;margin-bottom:8px;font-size:13px;line-height:1.6}
.nextbox{background:#EEF2FF;border-left:4px solid var(--blue);border-radius:0 8px 8px 0;padding:12px 14px;margin-bottom:1.25rem;font-size:13px;line-height:1.6}
.alertbox{background:#FEF3C7;border-left:4px solid #F59E0B;border-radius:0 8px 8px 0;padding:12px 14px;margin-bottom:1.25rem}
.alttitle{font-family:Montserrat,sans-serif;font-size:11px;font-weight:700;text-transform:uppercase;color:#B45309;margin-bottom:8px}
.altmsg{font-size:13px;color:#92400E;line-height:1.5;margin-bottom:6px}
.compbox{background:white;border:1px solid var(--border);border-radius:12px;padding:1.25rem;margin-bottom:1.25rem}
.compnums{display:flex;justify-content:space-between;margin-bottom:12px}
.compitem{text-align:center}
.complbl{font-size:12px;color:var(--muted);margin-bottom:4px}
.compval{font-family:Montserrat,sans-serif;font-weight:800;font-size:18px;color:var(--text)}
.compres{padding:10px 14px;background:var(--light);border-radius:8px;font-size:13px;font-weight:600}
.trendbox{display:flex;align-items:center;gap:8px;margin-bottom:1.25rem;padding:12px 14px;background:var(--light);border-radius:8px;font-size:13px;font-weight:600}
.slbl{font-family:Montserrat,sans-serif;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);margin-bottom:.75rem;display:flex;align-items:center;gap:8px}
.slbl::after{content:'';flex:1;height:1px;background:var(--border)}
.agcard{background:var(--blue);border-radius:12px;padding:1.25rem;display:flex;align-items:center;gap:1rem;margin-bottom:1.25rem}
.ag-logo{width:56px;height:56px;border-radius:50%;object-fit:cover;flex-shrink:0;border:2px solid rgba(255,255,255,0.4)}
.agname{font-family:Montserrat,sans-serif;font-weight:800;font-size:15px;color:white}
.agrole{font-size:12px;color:rgba(255,255,255,0.7);margin-top:2px}
.socwrap{margin-left:auto;display:flex;gap:8px}
.soc{width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;text-decoration:none;background:rgba(255,255,255,0.15)}
.ctawrap{display:flex;gap:8px;margin-top:1rem}
.cta{flex:1;padding:11px;border-radius:8px;font-family:Montserrat,sans-serif;font-size:13px;font-weight:700;text-decoration:none;text-align:center;display:flex;align-items:center;justify-content:center;gap:6px}
.ctaph{background:white;color:var(--blue)}
.ctawa{background:#25D366;color:white}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1a1a2e;color:white;padding:10px 20px;border-radius:8px;font-size:13px;font-family:Montserrat,sans-serif;font-weight:600;opacity:0;transition:opacity .3s;pointer-events:none;z-index:999}
.toast.show{opacity:1}
.chk-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.chk-item{display:flex;align-items:center;gap:8px;padding:9px 12px;border:1.5px solid var(--border);border-radius:8px;cursor:pointer;transition:border-color .15s,background .15s;user-select:none}
.chk-item:hover{border-color:var(--blue);background:#f0f4ff}
.chk-item input[type=checkbox]{width:16px;height:16px;accent-color:var(--blue);flex-shrink:0;cursor:pointer}
.chk-item span{font-size:13px;color:var(--text);line-height:1.3}
.chk-item.checked{border-color:var(--blue);background:#EEF2FF}
.lavoro-box{background:white;border:1px solid var(--border);border-radius:12px;padding:1.25rem;margin-bottom:1.25rem}
.lavoro-list{list-style:none;padding:0;margin:0}
.lavoro-list li{display:flex;align-items:flex-start;gap:8px;padding:7px 0;border-bottom:1px solid var(--light);font-size:13px;line-height:1.5;color:var(--text)}
.lavoro-list li:last-child{border-bottom:none}
.lavoro-list li::before{content:'✓';font-weight:700;color:var(--success);flex-shrink:0;margin-top:1px}
.lavoro-note{margin-top:10px;background:var(--light);border-radius:8px;padding:11px 13px;font-size:13px;line-height:1.6;color:var(--text)}
@media(max-width:520px){.chk-grid{grid-template-columns:1fr}}
.footer{text-align:center;padding:1.5rem;font-size:12px;color:var(--muted);border-top:1px solid var(--border);max-width:720px;margin:0 auto}
.footer strong{color:var(--blue)}
@media(max-width:520px){.r2,.r3{grid-template-columns:1fr}.stats3{grid-template-columns:1fr 1fr}.compnums{flex-wrap:wrap;gap:8px}.ctawrap{flex-direction:column}}
/* ── Rubrica Case ── */
.rubrica-card{background:white;border:1px solid var(--border);border-radius:12px;padding:1.25rem;margin-bottom:1.25rem}
.rubrica-title{font-family:Montserrat,sans-serif;font-size:13px;font-weight:700;color:var(--blue);text-transform:uppercase;letter-spacing:1px;margin-bottom:1rem;display:flex;align-items:center;justify-content:space-between}
.rubrica-count{background:#EEF2FF;color:var(--blue);font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px;letter-spacing:0;text-transform:none}
.casa-list{display:flex;flex-direction:column;gap:8px;margin-bottom:1rem}
.casa-item{display:flex;align-items:center;gap:10px;padding:11px 13px;border:1.5px solid var(--border);border-radius:10px;background:var(--light);transition:border-color .15s,background .15s;cursor:pointer}
.casa-item:hover{border-color:var(--blue);background:#f0f4ff}
.casa-info{flex:1;min-width:0}
.casa-nome{font-family:Montserrat,sans-serif;font-weight:700;font-size:13px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.casa-via{font-size:12px;color:var(--muted);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.casa-prezzo{font-size:11px;color:var(--blue);font-weight:600;margin-top:3px}
.casa-actions{display:flex;gap:6px;flex-shrink:0}
.btn-carica{padding:7px 13px;border-radius:7px;font-family:Montserrat,sans-serif;font-size:12px;font-weight:700;border:none;background:var(--blue);color:white;cursor:pointer;white-space:nowrap}
.btn-elimina{width:32px;height:32px;border-radius:7px;border:none;background:#FEE2E2;color:var(--red);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;flex-shrink:0}
.btn-elimina:hover{background:#FCA5A5}
.btn-salva-casa{width:100%;padding:11px;border-radius:8px;font-family:Montserrat,sans-serif;font-size:13px;font-weight:700;border:1.5px solid var(--blue);background:white;color:var(--blue);cursor:pointer;transition:background .15s}
.btn-salva-casa:hover{background:#EEF2FF}
.rubrica-empty{text-align:center;padding:1.5rem 0;color:var(--muted);font-size:13px}
.rubrica-empty-icon{font-size:28px;margin-bottom:8px}

.concbox{background:white;border:1px solid var(--border);border-radius:12px;padding:1.25rem;margin-bottom:1.25rem}
.conc-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:12px}
.conc-item{text-align:center;padding:12px;background:var(--light);border-radius:10px}
.conc-lbl{font-size:11px;color:var(--muted);margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
.conc-val{font-family:Montserrat,sans-serif;font-weight:800;font-size:20px;color:var(--text)}
.conc-note{font-size:13px;color:var(--muted);line-height:1.5;padding:10px 14px;background:var(--light);border-radius:8px}
.scenbox{background:#FFF7ED;border:2px solid #F97316;border-radius:12px;padding:1.25rem;margin-bottom:1.25rem}
.scen-title{font-family:Montserrat,sans-serif;font-size:12px;font-weight:700;text-transform:uppercase;color:#C2410C;letter-spacing:1px;margin-bottom:12px}
.scen-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.scen-item{text-align:center;padding:12px;border-radius:10px}
.scen-item-now{background:#FEE2E2}
.scen-item-adj{background:#DCFCE7}
.scen-lbl{font-size:11px;color:var(--muted);margin-bottom:4px}
.scen-val{font-family:Montserrat,sans-serif;font-weight:800;font-size:18px}
.scen-val-now{color:var(--red)}
.scen-val-adj{color:var(--success)}
.scen-desc{font-size:13px;line-height:1.6;color:#92400E}
.stimabox{display:flex;align-items:center;gap:14px;background:white;border:1px solid var(--border);border-radius:12px;padding:1.25rem;margin-bottom:1.25rem}
.stima-icon{width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:22px}
.stima-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px}
.stima-val{font-family:Montserrat,sans-serif;font-weight:800;font-size:17px}
.commentobox{background:var(--blue);border-radius:12px;padding:1.25rem;margin-bottom:1.25rem;color:white}
.commento-header{display:flex;align-items:center;gap:12px;margin-bottom:12px}
.commento-foto{width:44px;height:44px;border-radius:50%;object-fit:cover;border:2px solid rgba(255,255,255,0.3);flex-shrink:0}
.commento-chi{font-family:Montserrat,sans-serif;font-weight:700;font-size:13px;color:white}
.commento-ruolo{font-size:11px;color:rgba(255,255,255,0.65);margin-top:2px}
.commento-testo{font-size:13px;line-height:1.7;color:rgba(255,255,255,0.92);font-style:italic}
.note-interne-box{background:#FEF3C7;border:1.5px dashed #F59E0B;border-radius:8px;padding:10px 14px;margin-top:8px}
.note-interne-lbl{font-size:10px;font-weight:700;color:#92400E;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px}
@media(max-width:520px){.scen-grid{grid-template-columns:1fr}.conc-grid{grid-template-columns:1fr 1fr}}
</style>
</head>

var params = new URLSearchParams(window.location.search);
var isClient = params.has('p');
var LS_KEY = 'remax_case_v1';

function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(function() { t.classList.remove('show'); }, 2200);
}
function encode(obj) { return btoa(unescape(encodeURIComponent(JSON.stringify(obj)))); }
function decode(str) { try { return JSON.parse(decodeURIComponent(escape(atob(str)))); } catch(e) { return null; } }
function v(id) { var el = document.getElementById(id); return el ? el.value.trim() : ''; }
function toggleChk(label) {
  var cb = label.querySelector('input[type=checkbox]');
  setTimeout(function(){ label.classList.toggle('checked', cb.checked); }, 0);
}

/* ── Rubrica Case (localStorage) ── */
function getCaseList() {
  try { return JSON.parse(localStorage.getItem(LS_KEY) || '[]'); } catch(e) { return []; }
}
function saveCaseList(list) {
  localStorage.setItem(LS_KEY, JSON.stringify(list));
}
function salvaCasa() {
  var nome = v('f-nome'), via = v('f-via');
  if (!nome || !via) { alert('Inserisci almeno nome e indirizzo prima di salvare.'); return; }
  var list = getCaseList();
  var esistente = list.find(function(c){ return c.nome === nome && c.via === via; });
  if (esistente) {
    if (!confirm('Questa proprietà è già salvata. Vuoi aggiornare i dati?')) return;
    esistente.prezzo = v('f-prezzo');
    esistente.mq = v('f-mq');
    esistente.mediamq = v('f-mediamq');
    saveCaseList(list);
    showToast('Proprietà aggiornata!');
  } else {
    list.unshift({ id: Date.now(), nome: nome, via: via, prezzo: v('f-prezzo'), mq: v('f-mq'), mediamq: v('f-mediamq') });
    saveCaseList(list);
    showToast('Proprietà salvata!');
  }
  renderRubrica();
}
function caricaCasa(id) {
  var list = getCaseList();
  var casa = list.find(function(c){ return c.id == id; });
  if (!casa) return;
  document.getElementById('f-nome').value = casa.nome || '';
  document.getElementById('f-via').value = casa.via || '';
  document.getElementById('f-prezzo').value = casa.prezzo || '';
  document.getElementById('f-mq').value = casa.mq || '';
  document.getElementById('f-mediamq').value = casa.mediamq || '';
  // reset campi settimanali
  ['f-giorni','f-settimana','f-visite','f-richieste','f-prossime','f-views','f-offerte','f-commenti','f-obiezioni','f-passi','f-lavoro-note','f-conc-n','f-conc-prezzo','f-adeg','f-commento-agente'].forEach(function(fid){
    var el = document.getElementById(fid);
    if (el) el.value = '';
  });
  document.getElementById('f-interesse').value = 'Medio';
  document.getElementById('f-trend').value = 'stabile';
  document.querySelectorAll('#chk-grid input[type=checkbox]').forEach(function(cb){
    cb.checked = false;
    cb.closest('.chk-item').classList.remove('checked');
  });
  document.getElementById('result').innerHTML = '';
  showToast('Proprietà caricata: ' + casa.nome);
  window.scrollTo({ top: 0, behavior: 'smooth' });
}
function eliminaCasa(id) {
  var list = getCaseList();
  var casa = list.find(function(c){ return c.id == id; });
  if (!casa) return;
  if (!confirm('Eliminare "' + casa.nome + '" dalla rubrica?')) return;
  saveCaseList(list.filter(function(c){ return c.id != id; }));
  renderRubrica();
  showToast('Proprietà eliminata.');
}
function renderRubrica() {
  var el = document.getElementById('rubrica-container');
  if (!el) return;
  var list = getCaseList();
  if (list.length === 0) {
    el.innerHTML = '<div class="rubrica-empty"><div class="rubrica-empty-icon">🏠</div>Nessuna proprietà salvata.<br>Compila il form e clicca <strong>Salva in rubrica</strong>.</div>';
    document.getElementById('rubrica-count').textContent = '0';
    return;
  }
  document.getElementById('rubrica-count').textContent = list.length;
  var html = '<div class="casa-list">';
  list.forEach(function(c) {
    html += '<div class="casa-item">' +
      '<div class="casa-info" onclick="caricaCasa(' + c.id + ')">' +
        '<div class="casa-nome">' + escHtml(c.nome) + '</div>' +
        '<div class="casa-via">' + escHtml(c.via) + '</div>' +
        (c.prezzo ? '<div class="casa-prezzo">€ ' + parseInt(c.prezzo).toLocaleString('it-IT') + '</div>' : '') +
      '</div>' +
      '<div class="casa-actions">' +
        '<button class="btn-carica" onclick="caricaCasa(' + c.id + ')">Carica</button>' +
        '<button class="btn-elimina" onclick="eliminaCasa(' + c.id + ')" title="Elimina">✕</button>' +
      '</div>' +
    '</div>';
  });
  html += '</div>';
  el.innerHTML = html;
}
function escHtml(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
