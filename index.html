<!DOCTYPE html>

<head>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--red:#DC1B27;--blue:#003DA5;--light:#f5f6f8;--border:#e2e4ea;--text:#1a1a2e;--muted:#6b7280;--success:#16a34a}
body{font-family:'Open Sans',sans-serif;background:var(--light);color:var(--text);min-height:100vh}

.header-inner{max-width:720px;margin:0 auto;padding:1.75rem 1.5rem;display:flex;align-items:center;gap:1.25rem}
.logo-circle{width:60px;height:60px;border-radius:50%;background:var(--red);display:flex;align-items:center;justify-content:center;font-family:Montserrat,sans-serif;font-weight:800;font-size:13px;color:white;flex-shrink:0;border:3px solid rgba(255,255,255,0.2)}

.r2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.r3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:12px}
.r1{margin-bottom:12px}
.fg{display:flex;flex-direction:column;gap:5px}
.fg label{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1px}

.admin-box{border:2px dashed #c7d3f5;border-radius:12px;padding:1.5rem;margin-bottom:1.25rem;background:white}
.atitle{font-family:Montserrat,sans-serif;font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:1rem;display:flex;align-items:center;gap:8px}
.badge{background:var(--blue);color:white;font-size:10px;padding:2px 8px;border-radius:20px;text-transform:none;font-weight:600;letter-spacing:0}
.btn-gen{display:block;width:100%;padding:13px;border-radius:8px;font-family:Montserrat,sans-serif;font-size:14px;font-weight:700;cursor:pointer;border:none;background:var(--blue);color:white;margin-top:4px}
.btn-gen:disabled{background:#ccc;cursor:not-allowed}
.link-box{background:#EEF2FF;border:1.5px solid var(--blue);border-radius:10px;padding:1rem 1.25rem;margin-top:1rem}
.llbl{font-size:11px;font-weight:700;color:var(--blue);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px}
.lurl{font-size:12px;color:#003DA5;word-break:break-all;line-height:1.6;margin-bottom:10px;font-family:monospace;background:white;border:1px solid #c7d3f5;border-radius:6px;padding:8px 10px}

.lbtn-cp{background:var(--blue);color:white}
.lbtn-wa{background:#25D366;color:white}
.lbtn-pv{background:white;color:var(--blue);border:1.5px solid var(--blue)}
.rhead{background:white;border:1px solid var(--border);border-radius:12px;padding:1.5rem;margin-bottom:1.25rem}
.rtitle{font-family:Montserrat,sans-serif;font-size:22px;font-weight:800;color:var(--text);margin-bottom:4px}
.rsub{font-size:13px;color:var(--muted)}
.rbadge{display:inline-block;background:var(--red);color:white;font-family:Montserrat,sans-serif;font-size:11px;font-weight:700;padding:4px 12px;border-radius:20px;margin-top:8px}
.stats3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:1.25rem}
.stat{background:white;border:1px solid var(--border);border-radius:12px;padding:1.25rem;text-align:center}
.stic{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;margin:0 auto 10px}
.icb{background:#EEF2FF;color:var(--blue)}
.icr{background:#FEE2E2;color:var(--red)}
.icg{background:#DCFCE7;color:var(--success)}
.stn{font-family:Montserrat,sans-serif;font-size:28px;font-weight:800;color:var(--text)}
.stl{font-size:11px;color:var(--muted);margin-top:4px;text-transform:uppercase}

.pill-a{display:inline-block;padding:4px 12px;border-radius:20px;font-family:Montserrat,sans-serif;font-size:12px;font-weight:700;background:#DCFCE7;color:var(--success)}
.pill-m{display:inline-block;padding:4px 12px;border-radius:20px;font-family:Montserrat,sans-serif;font-size:12px;font-weight:700;background:#FEF3C7;color:#B45309}
.pill-b{display:inline-block;padding:4px 12px;border-radius:20px;font-family:Montserrat,sans-serif;font-size:12px;font-weight:700;background:#FEE2E2;color:var(--red)}
.fbbox{background:var(--light);border-radius:8px;padding:12px 14px;margin-bottom:8px;font-size:13px;line-height:1.6}
.fbwarn{background:#FEF3C7;border-radius:8px;padding:12px 14px;margin-bottom:8px;font-size:13px;line-height:1.6}
.nextbox{background:#EEF2FF;border-left:4px solid var(--blue);border-radius:0 8px 8px 0;padding:12px 14px;margin-bottom:1.25rem;font-size:13px;line-height:1.6}
.alertbox{background:#FEF3C7;border-left:4px solid #F59E0B;border-radius:0 8px 8px 0;padding:12px 14px;margin-bottom:1.25rem}
.alttitle{font-family:Montserrat,sans-serif;font-size:11px;font-weight:700;text-transform:uppercase;color:#B45309;margin-bottom:8px}
.altmsg{font-size:13px;color:#92400E;line-height:1.5;margin-bottom:6px}
.compbox{background:white;border:1px solid var(--border);border-radius:12px;padding:1.25rem;margin-bottom:1.25rem}
.compnums{display:flex;justify-content:space-between;margin-bottom:12px}
.compitem{text-align:center}
.complbl{font-size:12px;color:var(--muted);margin-bottom:4px}
.compval{font-family:Montserrat,sans-serif;font-weight:800;font-size:18px;color:var(--text)}
.compres{padding:10px 14px;background:var(--light);border-radius:8px;font-size:13px;font-weight:600}
.trendbox{display:flex;align-items:center;gap:8px;margin-bottom:1.25rem;padding:12px 14px;background:var(--light);border-radius:8px;font-size:13px;font-weight:600}
.slbl{font-family:Montserrat,sans-serif;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);margin-bottom:.75rem;display:flex;align-items:center;gap:8px}
.slbl::after{content:'';flex:1;height:1px;background:var(--border)}
.agcard{background:var(--blue);border-radius:12px;padding:1.25rem;display:flex;align-items:center;gap:1rem;margin-bottom:1.25rem}
.ag-logo{width:52px;height:52px;border-radius:50%;background:var(--red);display:flex;align-items:center;justify-content:center;font-family:Montserrat,sans-serif;font-weight:800;font-size:12px;color:white;flex-shrink:0;border:2px solid rgba(255,255,255,0.3)}
.agname{font-family:Montserrat,sans-serif;font-weight:800;font-size:15px;color:white}
.agrole{font-size:12px;color:rgba(255,255,255,0.7);margin-top:2px}
.socwrap{margin-left:auto;display:flex;gap:8px}
.soc{width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;text-decoration:none;background:rgba(255,255,255,0.15)}
.ctawrap{display:flex;gap:8px;margin-top:1rem}
.cta{flex:1;padding:11px;border-radius:8px;font-family:Montserrat,sans-serif;font-size:13px;font-weight:700;text-decoration:none;text-align:center;display:flex;align-items:center;justify-content:center;gap:6px}
.ctaph{background:white;color:var(--blue)}
.ctawa{background:#25D366;color:white}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1a1a2e;color:white;padding:10px 20px;border-radius:8px;font-size:13px;font-family:Montserrat,sans-serif;font-weight:600;opacity:0;transition:opacity .3s;pointer-events:none;z-index:999}
.toast.show{opacity:1}
.footer{text-align:center;padding:1.5rem;font-size:12px;color:var(--muted);border-top:1px solid var(--border);max-width:720px;margin:0 auto}
.footer strong{color:var(--blue)}
@media(max-width:520px){.r2,.r3{grid-template-columns:1fr}.stats3{grid-template-columns:1fr 1fr}.compnums{flex-wrap:wrap;gap:8px}.ctawrap{flex-direction:column}}
</style>
</head>
<body>
<div class="header">
  <div class="header-inner">
    <div class="logo-circle">RE/<br>MAX</div>
    <div class="header-text">
      <h1>RE/MAX Aequitas</h1>
      <h2>Mario Mela</h2>
      <p>Agente Immobiliare - Resoconto Settimanale</p>
    </div>
  </div>
</div>
<div class="main" id="app"></div>
<div class="footer"><strong>Mario Mela</strong> &middot; RE/MAX Aequitas &middot; Agente Immobiliare &middot; Tel. 324 1516914</div>
<div class="toast" id="toast"></div>
<script>
var params = new URLSearchParams(window.location.search);
var isClient = params.has('p');

function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(function() { t.classList.remove('show'); }, 2200);
}

function encode(obj) {
  return btoa(unescape(encodeURIComponent(JSON.stringify(obj))));
}

function decode(str) {
  try { return JSON.parse(decodeURIComponent(escape(atob(str)))); } catch(e) { return null; }
}

function v(id) { var el = document.getElementById(id); return el ? el.value.trim() : ''; }

function renderAdmin() {
  document.getElementById('app').innerHTML =
    '<div class="admin-box">' +
    '<div class="atitle">Pannello agente <span class="badge">solo tu vedi questo</span></div>' +
    '<div class="card"><div class="ctitle">Dati Immobile</div>' +
    '<div class="r2"><div class="fg"><label>Nome proprieta</label><input id="f-nome" placeholder="es. Appartamento Via Roma"></div><div class="fg"><label>Indirizzo</label><input id="f-via" placeholder="es. Via Roma 12, Pesaro"></div></div>' +
    '<div class="r3"><div class="fg"><label>Prezzo (euro)</label><input id="f-prezzo" placeholder="es. 280000"></div><div class="fg"><label>Giorni sul mercato</label><input type="number" id="f-giorni" placeholder="es. 45"></div><div class="fg"><label>Settimana</label><input id="f-settimana" placeholder="es. 5-11 Maggio"></div></div>' +
    '<div class="r2"><div class="fg"><label>Superficie (mq)</label><input type="number" id="f-mq" placeholder="es. 85"></div><div class="fg"><label>Prezzo medio zona (euro/mq)</label><input type="number" id="f-mediamq" placeholder="es. 2100"></div></div>' +
    '</div>' +
    '<div class="card"><div class="ctitle">Attivita Settimana</div>' +
    '<div class="r3"><div class="fg"><label>Visite effettuate</label><input type="number" id="f-visite" placeholder="0"></div><div class="fg"><label>Richieste info</label><input type="number" id="f-richieste" placeholder="0"></div><div class="fg"><label>Visite prossima sett.</label><input type="number" id="f-prossime" placeholder="0"></div></div>' +
    '<div class="r3"><div class="fg"><label>Visualizzazioni</label><input type="number" id="f-views" placeholder="0"></div><div class="fg"><label>Offerte ricevute</label><input type="number" id="f-offerte" placeholder="0"></div><div class="fg"><label>Interesse generale</label><select id="f-interesse"><option value="Alto">Alto</option><option value="Medio" selected>Medio</option><option value="Basso">Basso</option></select></div></div>' +
    '<div class="r1"><div class="fg"><label>Trend visite rispetto settimana scorsa</label><select id="f-trend"><option value="crescita">In crescita</option><option value="stabile" selected>Stabile</option><option value="calo">In calo</option></select></div></div>' +
    '</div>' +
    '<div class="card"><div class="ctitle">Feedback e Note</div>' +
    '<div class="r1"><div class="fg"><label>Commenti visitatori</label><textarea id="f-commenti" placeholder="es. Apprezzano la luminosita..."></textarea></div></div>' +
    '<div class="r1"><div class="fg"><label>Obiezioni principali</label><textarea id="f-obiezioni" placeholder="es. Prezzo percepito come alto..."></textarea></div></div>' +
    '<div class="r1" style="margin-bottom:0"><div class="fg"><label>Prossimi passi consigliati</label><textarea id="f-passi" placeholder="es. Valutare una riduzione del prezzo..."></textarea></div></div>' +
    '</div>' +
    '<button class="btn-gen" id="genbtn" onclick="makeReport()">Genera resoconto da condividere</button>' +
    '<div id="result"></div></div>';
}

function makeReport() {
  var nome = v('f-nome'), via = v('f-via');
  if (!nome || !via) { alert("Inserisci almeno nome e indirizzo."); return; }
  var data = { nome:nome, via:via, prezzo:v('f-prezzo'), giorni:v('f-giorni'), settimana:v('f-settimana'), mq:v('f-mq'), mediamq:v('f-mediamq'), visite:v('f-visite')||'0', richieste:v('f-richieste')||'0', prossime:v('f-prossime')||'0', views:v('f-views')||'0', offerte:v('f-offerte')||'0', interesse:document.getElementById('f-interesse').value, trend:document.getElementById('f-trend').value, commenti:v('f-commenti'), obiezioni:v('f-obiezioni'), passi:v('f-passi') };
  var base = 'https://melamario33-crypto.github.io/resoconto-remax/index.html';
  var link = base + '?p=' + encode(data);
  var btn = document.getElementById('genbtn');
  btn.disabled = true; btn.textContent = 'Generando...';
  document.getElementById('result').innerHTML = '<div class="link-box"><div class="llbl">Accorciando il link...</div></div>';
  var xhr = new XMLHttpRequest();
  xhr.open('GET', 'https://tinyurl.com/api-create.php?url=' + encodeURIComponent(link), true);
  xhr.onload = function() { btn.disabled=false; btn.textContent='Genera resoconto da condividere'; var fl=(xhr.status===200&&xhr.responseText.indexOf('tinyurl')!==-1)?xhr.responseText.trim():link; showResult(fl,link,nome,data.settimana?'Settimana '+data.settimana:''); };
  xhr.onerror = function() { btn.disabled=false; btn.textContent='Genera resoconto da condividere'; showResult(link,link,nome,data.settimana?'Settimana '+data.settimana:''); };
  xhr.send();
}

function showResult(fl, ll, nome, sett) {
  var msg = 'Resoconto settimanale per '+nome+(sett?' - '+sett:'')+'\n\nBuongiorno! Ecco il resoconto aggiornato della sua proprieta:\n'+fl+'\n\nSono disponibile per qualsiasi domanda.\nMario Mela - RE/MAX Aequitas';
  var wa = encodeURIComponent(msg);
  document.getElementById('result').innerHTML = '<div class="link-box"><div class="llbl">Resoconto pronto'+(sett?' - '+sett:'')+'</div><div class="lurl" id="fl">'+fl+'</div><div class="lbtns"><button class="lbtn lbtn-cp" onclick="copyLink()">Copia link</button><button class="lbtn lbtn-wa" onclick=\'window.open("https://wa.me/?text='+wa+'","_blank")\'>WhatsApp</button><button class="lbtn lbtn-pv" onclick=\'window.open("'+ll+'","_blank")\'>Anteprima</button></div></div>';
  document.getElementById('result').dataset.link = fl;
  document.getElementById('result').scrollIntoView({behavior:'smooth',block:'nearest'});
}

function copyLink() { var link=document.getElementById('result').dataset.link; navigator.clipboard.writeText(link).then(function(){showToast('Link copiato!');}); }

function renderReport() {
  var d = decode(params.get('p'));
  if (!d) { document.getElementById('app').innerHTML='<p style="padding:2rem;text-align:center;color:var(--muted)">Resoconto non valido.</p>'; return; }
  var h = '';
  h += '<div class="rhead"><div class="rtitle">'+(d.nome||'')+'</div><div class="rsub">'+(d.via||'')+'</div>'+(d.settimana?'<div class="rbadge">Settimana '+d.settimana+'</div>':'')+'</div>';
  h += '<div class="stats3"><div class="stat"><div class="stic icb"><svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178z"/><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg></div><div class="stn">'+(d.views||'0')+'</div><div class="stl">Visualizzazioni</div></div><div class="stat"><div class="stic icr"><svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.501 20.118a7.5 7.5 0 0114.998 0A17.933 17.933 0 0112 21.75c-2.676 0-5.216-.584-7.499-1.632z"/></svg></div><div class="stn">'+(d.visite||'0')+'</div><div class="stl">Visite effettuate</div></div><div class="stat"><div class="stic icg"><svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M8.625 12a.375.375 0 11-.75 0 .375.375 0 01.75 0zm0 0H8.25m4.125 0a.375.375 0 11-.75 0 .375.375 0 01.75 0zm0 0H12m4.125 0a.375.375 0 11-.75 0 .375.375 0 01.75 0zm0 0h-.375M21 12c0 4.556-4.03 8.25-9 8.25a9.764 9.764 0 01-2.555-.337A5.972 5.972 0 015.41 20.97a5.969 5.969 0 01-.474-.065 4.48 4.48 0 00.978-2.025c.09-.457-.133-.901-.467-1.226C3.93 16.178 3 14.189 3 12c0-4.556 4.03-8.25 9-8.25s9 3.694 9 8.25z"/></svg></div><div class="stn">'+(d.richieste||'0')+'</div><div class="stl">Richieste info</div></div></div>';
  h += '<div class="card"><div class="slbl">Dettagli immobile</div>';
  if (d.prezzo) h += '<div class="irow"><span class="ik">Prezzo di vendita</span><span class="iv">euro '+parseInt(d.prezzo).toLocaleString('it-IT')+'</span></div>';
  if (d.giorni) h += '<div class="irow"><span class="ik">Giorni sul mercato</span><span class="iv">'+d.giorni+' giorni</span></div>';
  if (d.mq) h += '<div class="irow"><span class="ik">Superficie</span><span class="iv">'+d.mq+' mq</span></div>';
  h += '<div class="irow"><span class="ik">Visite prossima sett.</span><span class="iv">'+(d.prossime||'0')+' programmate</span></div>';
  if (d.offerte&&d.offerte!='0') h += '<div class="irow"><span class="ik">Offerte ricevute</span><span class="iv">'+d.offerte+'</span></div>';
  var pc=d.interesse==='Alto'?'pill-a':d.interesse==='Medio'?'pill-m':'pill-b';
  h += '<div class="irow" style="border-bottom:none"><span class="ik">Interesse generale</span><span class="'+pc+'">'+(d.interesse||'Medio')+'</span></div></div>';
  if (d.mediamq&&d.mq&&d.prezzo) {
    var pn=parseFloat(String(d.prezzo).replace(/[^0-9]/g,'')),mn=parseFloat(d.mq),me=parseFloat(d.mediamq);
    if (pn&&mn&&me) {
      var pmq=Math.round(pn/mn),dp=((pmq-me)/me*100).toFixed(1),dn=parseFloat(dp);
      var col=dn>10?'var(--red)':dn>0?'#F59E0B':'var(--success)';
      var lbl=dn>10?'Sopra mercato - il prezzo potrebbe rallentare le trattative':dn>0?'Leggermente sopra - margine di miglioramento':'In linea con il mercato - prezzo competitivo';
      h += '<div class="compbox"><div class="slbl">Indice di competitivita</div><div class="compnums"><div class="compitem"><div class="complbl">Prezzo al mq</div><div class="compval">euro '+pmq.toLocaleString('it-IT')+'/mq</div></div><div class="compitem"><div class="complbl">Media zona</div><div class="compval">euro '+Math.round(me).toLocaleString('it-IT')+'/mq</div></div><div class="compitem"><div class="complbl">Differenza</div><div class="compval" style="color:'+col+'">'+(dn>0?'+':'')+dp+'%</div></div></div><div class="compres" style="color:'+col+'">'+lbl+'</div></div>';
    }
  }
