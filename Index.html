<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--red:#DC1B27;--blue:#003DA5;--light:#f5f6f8;--border:#e2e4ea;--text:#1a1a2e;--muted:#6b7280;--success:#16a34a;--success-bg:#f0fdf4}
body{font-family:'Open Sans',sans-serif;background:var(--light);color:var(--text);min-height:100vh}
.header{background:var(--blue);position:relative}
.header::after{content:'';position:absolute;bottom:0;left:0;right:0;height:4px;background:var(--red)}
.header-inner{max-width:720px;margin:0 auto;padding:1.75rem 1.5rem;display:flex;align-items:center;gap:1.25rem}
.logo-img{width:60px;height:60px;border-radius:50%;object-fit:cover;border:3px solid rgba(255,255,255,0.2);background:white;flex-shrink:0}
.header-text h1{font-family:'Montserrat',sans-serif;font-size:11px;font-weight:700;color:rgba(255,255,255,0.6);letter-spacing:2.5px;text-transform:uppercase;margin-bottom:3px}
.header-text h2{font-family:'Montserrat',sans-serif;font-size:21px;font-weight:800;color:white}
.header-text p{font-size:13px;color:rgba(255,255,255,0.65);margin-top:3px}
.main{max-width:720px;margin:0 auto;padding:1.5rem 1.5rem 3rem}
.card{background:white;border:1px solid var(--border);border-radius:12px;padding:1.5rem;margin-bottom:1.25rem}
.card-title{font-family:'Montserrat',sans-serif;font-size:14px;font-weight:700;color:var(--blue);text-transform:uppercase;letter-spacing:1px;margin-bottom:1.25rem;display:flex;align-items:center;gap:8px}
.card-title svg{flex-shrink:0}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.form-row.full{grid-template-columns:1fr}
.form-row.three{grid-template-columns:1fr 1fr 1fr}
.form-group{display:flex;flex-direction:column;gap:5px}
.form-group label{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1px}
.form-group input,.form-group select,.form-group textarea{padding:10px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:14px;font-family:'Open Sans',sans-serif;color:var(--text);background:white;outline:none;transition:border-color .15s}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--blue)}
.form-group textarea{resize:vertical;min-height:90px}
.admin-box{border:2px dashed #c7d3f5;border-radius:12px;padding:1.5rem;margin-bottom:1.25rem;background:white}
.admin-title{font-family:'Montserrat',sans-serif;font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:1rem;display:flex;align-items:center;gap:8px}
.admin-badge{background:var(--blue);color:white;font-size:10px;padding:2px 8px;border-radius:20px;letter-spacing:0;text-transform:none;font-weight:600}
.btn{display:block;width:100%;padding:13px 20px;border-radius:8px;font-family:'Montserrat',sans-serif;font-size:14px;font-weight:700;cursor:pointer;border:none;transition:all .15s;text-align:center}
.btn-blue{background:var(--blue);color:white}
.btn-blue:hover{background:#002d7a}
.btn-whatsapp{background:#25D366;color:white;display:flex;align-items:center;justify-content:center;gap:8px}
.btn-whatsapp:hover{background:#1da851}
.link-box{background:#EEF2FF;border:1.5px solid var(--blue);border-radius:10px;padding:1rem 1.25rem;margin-top:1rem}
.link-box .lbl{font-size:11px;font-weight:700;color:var(--blue);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px}
.link-url{font-size:12px;color:#003DA5;word-break:break-all;line-height:1.6;margin-bottom:10px;font-family:monospace;background:white;border:1px solid #c7d3f5;border-radius:6px;padding:8px 10px}
.link-actions{display:flex;gap:8px;flex-wrap:wrap}
.btn-copy{padding:9px 16px;border-radius:6px;font-family:'Montserrat',sans-serif;font-size:12px;font-weight:700;cursor:pointer;background:var(--blue);color:white;border:none}
.btn-wa{padding:9px 16px;border-radius:6px;font-family:'Montserrat',sans-serif;font-size:12px;font-weight:700;cursor:pointer;background:#25D366;color:white;border:none;display:flex;align-items:center;gap:6px}
.btn-prev{padding:9px 16px;border-radius:6px;font-family:'Montserrat',sans-serif;font-size:12px;font-weight:700;cursor:pointer;background:white;color:var(--blue);border:1.5px solid var(--blue)}
/* RESOCONTO VIEW */
.report-header{background:white;border:1px solid var(--border);border-radius:12px;padding:1.5rem;margin-bottom:1.25rem}
.report-title{font-family:'Montserrat',sans-serif;font-size:22px;font-weight:800;color:var(--text);margin-bottom:4px}
.report-subtitle{font-size:13px;color:var(--muted)}
.report-badge{display:inline-block;background:var(--red);color:white;font-family:'Montserrat',sans-serif;font-size:11px;font-weight:700;padding:4px 12px;border-radius:20px;margin-top:8px}
.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:1.25rem}
.stat-card{background:white;border:1px solid var(--border);border-radius:12px;padding:1.25rem;text-align:center}
.stat-icon{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;margin:0 auto 10px}
.stat-icon.blue{background:#EEF2FF;color:var(--blue)}
.stat-icon.red{background:#FEE2E2;color:var(--red)}
.stat-icon.green{background:#DCFCE7;color:var(--success)}
.stat-num{font-family:'Montserrat',sans-serif;font-size:28px;font-weight:800;color:var(--text);line-height:1}
.stat-label{font-size:11px;color:var(--muted);margin-top:4px;text-transform:uppercase;letter-spacing:0.5px}
.interest-bar{display:flex;align-items:center;gap:12px;margin-top:8px}
.interest-label{font-size:13px;color:var(--muted);width:60px;flex-shrink:0}
.bar-track{flex:1;height:10px;background:var(--light);border-radius:20px;overflow:hidden}
.bar-fill{height:100%;border-radius:20px;transition:width .3s}
.bar-fill.alto{background:var(--success)}
.bar-fill.medio{background:#F59E0B}
.bar-fill.basso{background:var(--red)}
.section-label{font-family:'Montserrat',sans-serif;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);margin-bottom:.75rem;display:flex;align-items:center;gap:8px}
.section-label::after{content:'';flex:1;height:1px;background:var(--border)}
.info-row{display:flex;justify-content:space-between;align-items:flex-start;padding:10px 0;border-bottom:1px solid var(--light)}
.info-row:last-child{border-bottom:none}
.info-key{font-size:13px;color:var(--muted);flex-shrink:0;width:160px}
.info-val{font-size:13px;color:var(--text);font-weight:600;text-align:right}
.feedback-box{background:var(--light);border-radius:8px;padding:12px 14px;margin-bottom:8px}
.feedback-box p{font-size:13px;color:var(--text);line-height:1.6}
.next-steps{background:#EEF2FF;border-left:4px solid var(--blue);border-radius:0 8px 8px 0;padding:12px 14px}
.next-steps p{font-size:13px;color:var(--text);line-height:1.6}
.agent-card{background:var(--blue);border-radius:12px;padding:1.25rem;display:flex;align-items:center;gap:1rem;margin-bottom:1.25rem}
.agent-card img{width:52px;height:52px;border-radius:50%;object-fit:cover;border:2px solid rgba(255,255,255,0.3);flex-shrink:0}
.agent-info .name{font-family:'Montserrat',sans-serif;font-weight:800;font-size:15px;color:white}
.agent-info .role{font-size:12px;color:rgba(255,255,255,0.7);margin-top:2px}
.agent-socials{margin-left:auto;display:flex;gap:8px}
.soc-btn{width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;text-decoration:none;background:rgba(255,255,255,0.15);transition:background .15s}
.soc-btn:hover{background:rgba(255,255,255,0.25)}
.soc-btn svg{color:white}
.cta-btns{display:flex;gap:8px;margin-top:1rem}
.cta-btn{flex:1;padding:11px;border-radius:8px;font-family:'Montserrat',sans-serif;font-size:13px;font-weight:700;text-decoration:none;text-align:center;display:flex;align-items:center;justify-content:center;gap:6px;transition:all .15s}
.cta-btn.phone{background:white;color:var(--blue)}
.cta-btn.wa{background:#25D366;color:white}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1a1a2e;color:white;padding:10px 20px;border-radius:8px;font-size:13px;font-family:'Montserrat',sans-serif;font-weight:600;opacity:0;transition:opacity .3s;pointer-events:none;z-index:999}
.toast.show{opacity:1}
.footer{text-align:center;padding:1.5rem;font-size:12px;color:var(--muted);border-top:1px solid var(--border);max-width:720px;margin:0 auto}
.footer strong{color:var(--blue)}
.interest-pill{display:inline-block;padding:4px 12px;border-radius:20px;font-family:'Montserrat',sans-serif;font-size:12px;font-weight:700}
.interest-pill.Alto{background:#DCFCE7;color:var(--success)}
.interest-pill.Medio{background:#FEF3C7;color:#B45309}
.interest-pill.Basso{background:#FEE2E2;color:var(--red)}
@media(max-width:520px){
  .form-row{grid-template-columns:1fr}
  .form-row.three{grid-template-columns:1fr 1fr}
  .stats-grid{grid-template-columns:1fr 1fr}
  .link-actions{flex-direction:column}
  .cta-btns{flex-direction:column}
}
</style>
</head>
<body>
